name: build ipa

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v1.2.2

      - name: select xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: resolve packages
        run: xcodebuild -resolvePackageDependencies -project Amperfy.xcodeproj -scheme Amperfy

      - name: strip entitlements
        run: |
          /usr/libexec/PlistBuddy -c "Clear dict" Amperfy/Amperfy.entitlements 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :get-task-allow bool true" Amperfy/Amperfy.entitlements

      - name: build archive
        run: |
          xcodebuild archive \
            -project Amperfy.xcodeproj \
            -scheme Amperfy \
            -destination "generic/platform=iOS" \
            -archivePath build/Amperfy.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: export ipa
        run: |
          mkdir -p build/Payload
          cp -r build/Amperfy.xcarchive/Products/Applications/Amperfy.app build/Payload/
          cd build && zip -r Amperfy.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: Amperfy-ipa
          path: build/Amperfy.ipa
